name: Release

on:
  push:
    branches: [main]

# Don't cancel an in-flight release; let one finish before the next starts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build
      - run: npm run size

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if git tag already exists
        id: tag
        run: |
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag the release commit
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.ver.outputs.version }}" -m "Release v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Create GitHub Release with built artifacts
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/embed.js
            dist/embed.js.map

      - name: Summary
        if: always()
        run: |
          {
            echo "## Release run"
            echo ""
            echo "- **Version (package.json):** \`${{ steps.ver.outputs.version }}\`"
            echo "- **Git tag created:** \`${{ steps.tag.outputs.exists == 'false' }}\`"
            echo ""
            echo "### Script tag URL"
            echo ""
            echo '```html'
            echo '<script src="https://github.com/${{ github.repository }}/releases/latest/download/embed.js"></script>'
            echo '```'
            echo ""
            echo "Or pinned to this version:"
            echo ""
            echo '```html'
            echo "<script src=\"https://github.com/${{ github.repository }}/releases/download/v${{ steps.ver.outputs.version }}/embed.js\"></script>"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
