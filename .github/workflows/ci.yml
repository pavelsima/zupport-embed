name: CI

on:
  pull_request:
  # Pushes to `main` are handled by release.yml, which runs the same checks
  # before tagging + publishing — so we don't double-run them here.
  workflow_dispatch:

jobs:
  test:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test -- --run
      - run: npm run size
